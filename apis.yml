aid: dragonfly
name: Dragonfly
description: >-
  Dragonfly is a modern in-memory datastore built for performance and
  scalability, designed as a drop-in replacement for Redis and Memcached with
  improved efficiency and throughput. Dragonfly uses a multi-threaded,
  shared-nothing architecture to deliver significantly higher throughput with
  lower latency than Redis. It is fully compatible with Redis and Memcached
  APIs, requiring no code changes to migrate existing workloads.
